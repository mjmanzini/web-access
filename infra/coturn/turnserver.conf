# Coturn config for Web-Access.
# Variables $PUBLIC_IP, $TURN_REALM, $TURN_SHARED_SECRET, $TURN_MIN_PORT,
# $TURN_MAX_PORT are substituted by docker-entrypoint at start-up.

listening-port=3478
# tls-listening-port=5349

# Advertise this public IP to clients. Without it, relay candidates will carry
# the container's private IP and clients behind NAT won't connect.
external-ip=$PUBLIC_IP

# Media relay range. Open these UDP ports in the VPS firewall.
min-port=$TURN_MIN_PORT
max-port=$TURN_MAX_PORT

# Time-limited REST credentials. The signaling server mints
#   username = <unix-ts-when-valid-until>:webaccess
#   password = HMAC-SHA1(secret, username) base64-encoded
use-auth-secret
static-auth-secret=$TURN_SHARED_SECRET

realm=$TURN_REALM

# Recommended hardening.
fingerprint
no-multicast-peers
no-cli
# Block LAN ranges from being relayed (prevents TURN being abused to scan your
# internal network).
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Uncomment once you have TLS certs mounted:
# cert=/etc/coturn/fullchain.pem
# pkey=/etc/coturn/privkey.pem
