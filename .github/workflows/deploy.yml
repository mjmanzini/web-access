name: deploy

# Deploys the latest commit on `main` to the VPS over SSH.
#
# Required repository secrets:
#   DEPLOY_HOST       — IP or DNS name of the VPS (e.g. 154.115.158.177)
#   DEPLOY_USER       — non-root user with docker group membership (e.g. ubuntu)
#   DEPLOY_SSH_KEY    — private OpenSSH key authorized on the VPS
#   DEPLOY_PATH       — absolute path to the repo on the VPS (e.g. /home/ubuntu/web-access)
# Optional:
#   DEPLOY_KNOWN_HOSTS — output of `ssh-keyscan <host>` to pin the host key

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-to-vps
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" > ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Pull & redeploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy "$USER@$HOST" "bash -se -- '$DEPLOY_PATH'" <<'EOF'
            set -euo pipefail
            DEPLOY_PATH="$1"
            cd "$DEPLOY_PATH"
            echo "[deploy] git pull"
            git fetch --all --prune
            git reset --hard origin/main
            echo "[deploy] rebuilding signaling + web-client"
            docker compose --env-file infra/.env -f infra/docker-compose.yml \
              up -d --build --no-deps signaling web-client
            echo "[deploy] running services"
            docker compose --env-file infra/.env -f infra/docker-compose.yml ps
          EOF

      - name: Smoke test public endpoints
        env:
          WEB_URL: ${{ vars.WEB_URL }}
          SIGNAL_URL: ${{ vars.SIGNAL_URL }}
        run: |
          set -e
          if [ -n "${WEB_URL:-}" ]; then
            echo "[verify] $WEB_URL"
            curl -fsS -I --max-time 15 "$WEB_URL"
          fi
          if [ -n "${SIGNAL_URL:-}" ]; then
            echo "[verify] $SIGNAL_URL/healthz"
            curl -fsS --max-time 15 "$SIGNAL_URL/healthz"
          fi
