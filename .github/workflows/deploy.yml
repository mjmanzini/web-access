name: deploy

# Deploys the latest commit on `main` using a self-hosted runner on the VPS.
#
# Required environment secret:
#   DEPLOY_PATH       — absolute path to the repo on the VPS (e.g. /home/ubuntu/web-access)
#
# Required self-hosted runner labels on the VPS:
#   self-hosted, linux, x64, web-access-vps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-to-vps
    runs-on: [self-hosted, linux, x64, web-access-vps]
    environment: production
    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::error title=Missing deploy secret::DEPLOY_PATH is not configured for the production environment."
            exit 1
          fi
          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "::error title=Missing deploy checkout::$DEPLOY_PATH does not contain a git checkout on the VPS runner."
            exit 1
          fi

      - name: Pull & redeploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          echo "[deploy] git fetch"
          git fetch --all --prune
          git reset --hard "$GITHUB_SHA"
          echo "[deploy] rebuilding signaling + web-client"
          docker compose --env-file infra/.env -f infra/docker-compose.yml \
            up -d --build --no-deps signaling web-client
          echo "[deploy] running services"
          docker compose --env-file infra/.env -f infra/docker-compose.yml ps

      - name: Smoke test public endpoints
        env:
          WEB_URL: ${{ vars.WEB_URL }}
          SIGNAL_URL: ${{ vars.SIGNAL_URL }}
        run: |
          set -e
          if [ -n "${WEB_URL:-}" ]; then
            echo "[verify] $WEB_URL"
            curl -fsS -I --max-time 15 "$WEB_URL"
          fi
          if [ -n "${SIGNAL_URL:-}" ]; then
            echo "[verify] $SIGNAL_URL/readyz"
            curl -fsS --max-time 15 "$SIGNAL_URL/readyz"
          fi
